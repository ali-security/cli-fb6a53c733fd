name: test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
  workflow_dispatch:

jobs:
  ctn:
    runs-on: ubuntu-24.04
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Test
        uses: docker/bake-action@v5
        with:
          targets: test-coverage

  host:
    runs-on: ${{ matrix.os }}
    env:
      GOPATH: ${{ github.workspace }}
      GOBIN: ${{ github.workspace }}/bin
      GO111MODULE: auto
      CGO_ENABLED: '0'
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
    steps:
      -
        name: Prepare git
        if: matrix.os == 'windows-latest'
        run: |
          git config --system core.autocrlf false
          git config --system core.eol lf
      -
        name: Checkout
        uses: actions/checkout@v4
        with:
          path: ${{ env.GOPATH }}/src/github.com/docker/cli
      -
        name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.21.11
      -
        name: Test
        run: |
          EXCLUDE='/vendor/|/e2e/|/connhelper/'
          if [ "$RUNNER_OS" = "Windows" ]; then
            # Exclude packages with Unix-only syscalls, signal handling,
            # Unix domain sockets, or Unix file-permission tests
            EXCLUDE="$EXCLUDE|/cli/command$|/cli/command/container$"
            EXCLUDE="$EXCLUDE|/cli/command/builder$|/cli/command/context$"
            EXCLUDE="$EXCLUDE|/cli/command/image$|/cli/command/network$"
            EXCLUDE="$EXCLUDE|/cli/command/plugin$|/cli/command/system$"
            EXCLUDE="$EXCLUDE|/cli/command/trust$|/cli/command/volume$"
            EXCLUDE="$EXCLUDE|/cli/config$|/cli/context/store$"
            EXCLUDE="$EXCLUDE|/cli-plugins/manager$|/cli-plugins/socket$"
            EXCLUDE="$EXCLUDE|/cmd/docker$|/opts$"
          fi
          go test $(go list ./... | grep -vE "$EXCLUDE")
        working-directory: ${{ env.GOPATH }}/src/github.com/docker/cli
        shell: bash
